<!DOCTYPE html>
<html>
<head>
    <title>내 기술 스택</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">내 기술 스택</h1>
    <h2 class="text-md text-gray-400 mb-4">해야할 일 목록</h2>

    <form action="/send" method="POST" class="mb-6 space-y-2">
        <input 
            type="text" 
            name="skill" 
            placeholder="기술명 예: Python"
            class="border px-3 py-2 rounded w-full"
        >

        <input 
            type="text" 
            name="level" 
            placeholder="수준 : 상, 중, 하"
            class="border px-3 py-2 rounded w-full"
        >

        <input 
            type="text" 
            name="status" 
            placeholder="상태 : 학습중, 학습완료"
            class="border px-3 py-2 rounded w-full"
        >

        <button 
            type="submit"
            class="bg-blue-500 text-white px-4 py-2 rounded"
        >
            추가
        </button>
    </form>
<div class="space-y-2">
    <h3 class="mt-9 text-xl font-bold">입력한 데이터</h3>

    {% for item in messages %}
        <div class="border p-3 rounded flex items-center">

            <div class="flex-1">
                <div class="flex items-center gap-2">
                    <input type="checkbox"
                        name="delete_indexes"
                        value="{{ loop.index0 }}"
                        form="deleteForm">

                    <p class="font-bold">{{ item["skill"] }}</p>
                </div>

                <p class="text-sm text-gray-600 mt-1 ml-6">
                    수준: {{ item["level"] }} / 상태: {{ item["status"] }}
                </p>
            </div>

            <form action="/delete"
                method="post"
                onsubmit="return confirm('정말 삭제할까요?')">

                <input type="hidden" name="index" value="{{ loop.index0 }}">

                <button type="submit"
                    class="bg-red-500 text-white px-3 py-1 rounded">
                    삭제
                </button>
            </form>

        </div>
    {% endfor %}
<div class="flex gap-2 mt-4">

    <form id="deleteForm" action="/delete_selected" method="post">
        <button
            type="submit"
            class="bg-orange-500 text-white px-4 py-2 rounded">
            선택 삭제
        </button>
    </form>

    <form action="/delete_all" method="post">
        <button
            type="submit"
            class="bg-red-500 text-white px-4 py-2 rounded">
            전체 삭제
        </button>
    </form>

</div>
</body>
</html>
